name: SunoPlayer
options:
  bundleIdPrefix: com.toma
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
targets:
  SunoPlayer:
    type: application
    platform: iOS
    sources:
      - path: SunoPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thomas.sunoplayer
        DEVELOPMENT_TEAM: VYGBHQ4ZDQ
        INFOPLIST_FILE: SunoPlayer/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - SunoPlayerTests
      gatherCoverageData: true
  SunoPlayerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SunoPlayerTests
    dependencies:
      - target: SunoPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thomas.sunoplayer.tests
        GENERATE_INFOPLIST_FILE: YES
